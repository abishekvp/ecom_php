<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Comm</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body onload="auth()">
    <nav>
        <a href="./dashboard.html"><span>Dashboard</span></a>
        <a href="./orders.html"><span>Orders</span></a>
        <a href="./products.html"><span>Products</span></a>
        <a href="./profile.html"><span>Profile</span></a>
        <a href="./try.html"><span>Trials</span></a>
    </nav>
    <div class="add_product">
        <div>
            <canvas id="canvas" style="display: none;"></canvas>
            <label for="p_image">Product Image : </label>
            <input type="file" name="p_image" id="p_image" accept="image/*">
        </div>
        <div>
            <label for="p_name">Product Name : </label><input type="text" name="p_name" id="p_name"><br>
        </div>
        <label for="descr">Description : </label><input type="text" name="descr" id="descr"><br>
        <label for="rate">Rate : </label><input type="text" name="rate" id="rate"><br>
        <label for="qty">Quantity : </label><input type="text" name="qty" id="qty"><br>
        <div>
            <label>Stock Availability : </label>
            <input type="radio" name="stock" id="true" value="true" checked>
            <label for="true">Avaialable</label>
            <input type="radio" name="stock" id="false" value="false">
            <label for="false">Not Avaialable</label>
        </div>
        <button type="submit" onclick="add_product()">Update</button>
        <br>
        <span id="imgspan"></span><br>
        <img id="resimg" alt="">
    </div>
    <script src="./js/jquery.min.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
